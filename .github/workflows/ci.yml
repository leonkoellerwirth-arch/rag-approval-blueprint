# Canonical Python CI — copy to .github/workflows/ci.yml. Drop the `web` note if no frontend.
#
# Single source of truth: the authoritative correctness check is `scripts/gate.sh` — the SAME
# gate you run locally (CONSTITUTION §4: "CI mirrors the local gate exactly"). Never duplicate
# ruff/pytest invocations here; if a check belongs in CI, it belongs in the gate.
#
# Zero-trust: actions are pinned to a full commit SHA (a tag is mutable, a SHA is not) and
# `dependabot.yml`'s github-actions ecosystem keeps these pins fresh.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck
      - name: Hard gate (lint · format · tests · guardrails · shellcheck)
        run: ./scripts/gate.sh

  supply-chain:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: Audit dependencies for known CVEs
        run: |
          pip install pip-audit
          pip-audit

  # Authoritative secret scan — full history, driven by .gitleaks.toml.
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
