# Canonical release workflow — signed, provenance- AND SBOM-attested releases. Triggers on v* tags.
# Copy to .github/workflows/release.yml. Actions are SHA-pinned (zero-trust).
name: Release

on:
  push:
    tags:
      - "v*"

# Scoped to exactly the writes a release needs, and nothing more.
permissions:
  contents: write        # create the GitHub Release
  id-token: write        # OIDC token for keyless signing
  attestations: write    # record build-provenance + SBOM attestations

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false   # never cancel a half-published release

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build
      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: ./dist
          format: cyclonedx-json
          output-file: sbom.cdx.json
      - name: Attest build provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: "dist/*"
      - name: Attest SBOM
        uses: actions/attest-sbom@4651f806c01d8637787e274ac3bdf724ef169f34 # v3
        with:
          subject-path: "dist/*"
          sbom-path: "sbom.cdx.json"
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/*
            sbom.cdx.json
          generate_release_notes: true
